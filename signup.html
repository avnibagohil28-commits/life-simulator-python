<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Life Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-950 to-slate-900 flex items-center justify-center min-h-screen text-white p-4">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-extrabold text-center tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">Create Account</h2>
        <p class="text-sm text-gray-400 text-center mb-6">Begin your virtual destiny path</p>
        
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 p-3 rounded-lg text-sm mb-4 text-center">{{ error }}</div>
        {% endif %}

        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-black/40 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Email Address</label>
                <input type="email" name="email" required class="w-full bg-black/40 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-black/40 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition">
            </div>
            <button type="submit" class="w-full mt-2 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 font-bold py-3 rounded-lg shadow-lg cursor-pointer transform hover:-translate-y-0.5 transition duration-150">Sign Up</button>
        </form>
        <p class="text-sm text-gray-400 text-center mt-6">Already have an account? <a href="/login" class="text-purple-400 font-semibold hover:underline">Log In</a></p>
    </div>
</body>
</html>
